<button commandfor="closing-behaviors-dialog-html" command="show-modal" class="ui-button ui-outlined">
	Open dialog
</button>

<dialog id="closing-behaviors-dialog-html" class="ui-dialog ui-card ui-elevated" closedby="any">
	<hgroup>
		<h2 class="ui-h4">How to close</h2>
	</hgroup>
	<div class="ui-content">
		<div class="ui-fieldset">
			<p class="ui-legend">Choose a closing behavior:</p>
			<div class="ui-field-group" role="group">
				<label class="ui-radio">
					<input type="radio" name="closedby-demo-html" value="any" checked>
					<span>any</span>
				</label>
				<label class="ui-radio">
					<input type="radio" name="closedby-demo-html" value="closerequest">
					<span>closerequest</span>
				</label>
				<label class="ui-radio">
					<input type="radio" name="closedby-demo-html" value="none">
					<span>none</span>
				</label>
			</div>
		</div>
	</div>
	<div class="ui-actions">
		<button commandfor="closing-behaviors-dialog-html" command="close" class="ui-button">
			Close manually
		</button>
	</div>
</dialog>

<script>
	const radios = document.querySelectorAll('input[name="closedby-demo-html"]')

	radios.forEach((radio) => {
		radio.addEventListener("change", () => {
			const dialog = radio.closest('.example-preview')?.querySelector("#closing-behaviors-dialog-html")
			if (dialog instanceof HTMLDialogElement) {
				dialog.setAttribute("closedby", radio.value)
			}
		})
	})
</script>
