<button class="button filled green" commandfor="toast-manager" command="--show-toast" data-title="Success!"
	data-severity="success">
	Success
</button>

<button class="button filled red" commandfor="toast-manager" command="--show-toast" data-title="Something went wrong"
	data-severity="critical">
	Error
</button>

<button class="button filled blue" commandfor="toast-manager" command="--show-toast" data-title="Did you know?"
	data-severity="info">
	Info
</button>
